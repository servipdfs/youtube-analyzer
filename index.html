<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analizador de Canales YouTube</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div class="container">
    <header>
      <h1> Analizador de Canales YouTube</h1>
      <p class="subtitle">Canales faceless con más visualizaciones de los últimos 5 días</p>
      <p class="last-update" id="lastUpdate"></p>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Cargando datos...</p>
    </div>

    <div id="channelsGrid" class="channels-grid"></div>
  </div>

  <script src="script.js?v=2"></script>
</body>
</html>
